// ===== RENDER =====
let answers = {};

function renderQuestions() {
  const container = document.getElementById('questions');
  questions.forEach((q, idx) => {
    const div = document.createElement('div');
    div.className = 'q-block';
    div.id = 'q-' + idx;

    const tagSpan = `<span class="q-tag tag-${q.type}">${q.tag}</span>`;
    div.innerHTML = `
      <div class="q-text">${tagSpan}${idx + 1}. ${q.q}</div>
      <div class="opts" id="opts-${idx}">
        ${q.opts.map((o, oi) => `
          <label id="lbl-${idx}-${oi}" onclick="selectAnswer(${idx}, ${oi})">
            <input type="radio" name="q-${idx}" value="${oi}">
            <span>${o}</span>
          </label>
        `).join('')}
      </div>
      <div class="explanation" id="expl-${idx}"></div>
    `;
    container.appendChild(div);
  });
  updateScore();
}

function selectAnswer(qIdx, optIdx) {
  const q = questions[qIdx];
  if (answers[qIdx] !== undefined) return; // already answered

  answers[qIdx] = optIdx;
  const block = document.getElementById('q-' + qIdx);
  const labels = document.querySelectorAll(`#opts-${qIdx} label`);
  const expl = document.getElementById('expl-' + qIdx);

  // Disable all
  labels.forEach(l => l.classList.add('disabled'));

  // Mark chosen
  labels[optIdx].classList.add('chosen');

  const isCorrect = optIdx === q.correct;
  if (isCorrect) {
    block.classList.add('correct');
    labels[optIdx].classList.add('correct');
    expl.className = 'explanation show explain-ok';
    expl.innerHTML = `✅ <strong>Correct!</strong> ${q.explain}`;
  } else {
    block.classList.add('wrong');
    labels[optIdx].classList.add('wrong');
    labels[q.correct].classList.add('correct');
    expl.className = 'explanation show explain-ko';
    expl.innerHTML = `❌ <strong>Not quite.</strong> The correct answer is <strong>"${q.opts[q.correct]}"</strong>.<br>${q.explain}`;
  }

  updateScore();
}

function updateScore() {
  const total = questions.length;
  const done = Object.keys(answers).length;
  const correct = Object.entries(answers).filter(([idx, ans]) => ans === questions[+idx].correct).length;
  const el = document.getElementById('live-score');
  if (done === total) {
    const pct = Math.round(correct / total * 100);
    el.innerHTML = `✅ You answered all ${total} questions. <span class="score-badge ${pct >= 60 ? 'ok' : 'ko'}">${correct}/${total} (${pct}%)</span>`;
  } else {
    el.innerHTML = `📝 ${done}/${total} answered — ${correct} correct so far.`;
  }
}

    alert(`Please answer all ${total} questions first (${done} answered).`);

  const list = document.getElementById('recap-list');
  const summary = document.getElementById('recap-summary');

    list.innerHTML = '<p style="color:#2e7d32;font-weight:600;">🎉 Perfect score! No mistakes to review.</p>';

      const item = document.createElement('div');

      item.innerHTML = `
        <div class="recap-q">${e.q}</div>
        <div class="recap-your">❌ Your answer: ${yourAns}</div>
        <div class="recap-correct">✅ Correct answer: ${correctAns}</div>
        <div style="font-size:0.9em;color:#555;margin-top:4px;">${e.explain}</div>
      `;
      list.appendChild(item);
    });
  }

  summary.innerHTML = `You got <strong>${correctCount}/${total}</strong> (${pct}%). ${pct >= 60 ? '👍 Well done!' : '📚 Keep reviewing the mistakes above.'}`;

  document.getElementById('recap-btn').disabled = true;
  document.getElementById('recap-btn').textContent = '✅ Results displayed above';
  document.getElementById('live-score').scrollIntoView({ behavior: 'smooth' });
}

function renderExpressions() {
  const container = document.getElementById('expr-list');
  expressions.forEach((e, i) => {
    const div = document.createElement('div');
    div.className = 'expr-item';
    div.innerHTML = `
      <div class="expr-phrase">${i + 1}. ${e.phrase}</div>
      <div class="expr-example">💡 ${e.example}</div>
      <div class="expr-similar"><strong>🔁 Similar expressions:</strong> ${e.similar}</div>
    `;
    container.appendChild(div);
  });
}

renderQuestions();
renderExpressions();
</script>
</body>
</html>
